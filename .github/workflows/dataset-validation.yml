name: Dataset Validation and Verification
description: Validate dataset schema, verify projects can be built and tests pass
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dataset/**'

jobs:
  validate-schema-and-list-entries:
    runs-on: windows-latest
    outputs:
      entries: ${{ steps.get-entries.outputs.entries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Validate dataset schema
        run: |
          python -m bcbench dataset validate

      - name: Get entries for matrix
        id: get-entries
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            python -m bcbench dataset list --github-output entries
          } else {
            python -m bcbench dataset list --github-output entries --modified-only
          }
        shell: pwsh

  verify-build-and-tests:
    runs-on: windows-latest
    needs: validate-schema-and-list-entries
    if: needs.validate-schema-and-list-entries.outputs.entries != '[]'
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.validate-schema-and-list-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper module
        run: |
          Install-Module -Name BcContainerHelper -Force -AllowClobber
        shell: pwsh

      - name: Setup BC container and clone repository for Entry ${{ matrix.entry }}
        id: setup-env
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          NAV_REPO_TOKEN: ${{ secrets.NAV_REPO_TOKEN }}
        run: |
          cd scripts/powershell
          .\Setup-ContainerAndRepository.ps1 -Entry "${{ matrix.entry }}"
        shell: pwsh

      - name: Run build and test verification for Entry ${{ matrix.entry }}
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
        run: |
          cd scripts/powershell
          .\Verify-BuildAndTests.ps1 -Entry "${{ matrix.entry }}" -NAVClonePath "${{ steps.setup-env.outputs.nav_clone_path }}"
        shell: pwsh
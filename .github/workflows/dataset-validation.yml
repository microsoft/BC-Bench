name: Dataset Validation and Verification
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sundays at midnight
  pull_request:
    paths:
      - "dataset/**"

jobs:
  validate-schema-and-list-entries:
    uses: ./.github/workflows/get-entries.yml
    with:
      modified-only: ${{ github.event_name == 'pull_request' }}
      validate-schema: true

  verify-build-and-tests:
    runs-on: windows-latest
    needs: validate-schema-and-list-entries
    env:
      BC_CONTAINER_NAME: bcbench
      BC_CONTAINER_USERNAME: admin
    if: needs.validate-schema-and-list-entries.outputs.entries != '[]'
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.validate-schema-and-list-entries.outputs.entries) }}
    steps:
      - name: Generate random container password
        run: |
          # Generate a 32-character cryptographically secure random password
          # Using .NET's RandomNumberGenerator for cryptographically secure randomness
          $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
          $rng = [System.Security.Cryptography.RandomNumberGenerator]::Create()
          $bytes = New-Object byte[] 32
          $rng.GetBytes($bytes)
          $password = -join ($bytes | ForEach-Object { $chars[$_ % $chars.Length] })
          "BC_CONTAINER_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup BC container
        id: setup-env
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          ado-token: ${{ secrets.ADO_TOKEN }}

      - name: Run build and test verification for ${{ matrix.entry }}
        timeout-minutes: 60
        run: .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ matrix.entry }}" -RepoPath "${{ steps.setup-env.outputs.repo_path }}"
        shell: pwsh

name: Dataset Validation and Verification
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      test-run:
        description: "Indicate this is a test run (with few entries)"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 0 * * 0"

jobs:
  # TEMP: focused on v24 entries to validate manifest.json injection workaround
  # (see scripts/BCContainerManagement.psm1). Restore get-entries job before merging.
  verify-build-and-tests:
    runs-on: [GitHub-BCBench]
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      matrix:
        entry:
          - microsoftInternal__NAV-178045
          - microsoftInternal__NAV-176426
          - microsoftInternal__NAV-180484
          - microsoftInternal__NAV-185792
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup BC container
        id: setup-env
        timeout-minutes: 40
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build and test verification for ${{ matrix.entry }}
        timeout-minutes: 60
        run: .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ matrix.entry }}" -RepoPath "${{ steps.setup-env.outputs.repo_path }}"
        shell: pwsh

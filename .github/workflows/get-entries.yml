name: Get Dataset Entries
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      modified-only:
        description: Only return modified entries (for PR contexts)
        required: false
        type: boolean
        default: false
      test-run:
        description: Indicate this is a test run (with 2 entries)
        required: false
        type: boolean
        default: false
      category:
        description: Evaluation category
        required: true
        type: string
        default: "bug-fix"
    outputs:
      entries:
        description: JSON array of dataset entries
        value: ${{ jobs.get-entries.outputs.entries }}
      runner:
        description: GitHub Actions runner label to evaluate this category on
        value: ${{ jobs.get-entries.outputs.runner }}
      requires-container:
        description: Whether this category needs a BC container ("true"/"false")
        value: ${{ jobs.get-entries.outputs.requires-container }}

jobs:
  get-entries:
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.get-entries.outputs.entries }}
      runner: ${{ steps.runtime-config.outputs.runner }}
      requires-container: ${{ steps.runtime-config.outputs.requires-container }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.modified-only && '0' || '1' }}

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Get runtime config for matrix
        id: runtime-config
        run: uv run bcbench category runtime-config --category ${{ inputs.category }}

      - name: Get entries for matrix
        id: get-entries
        run: |
          cmd="uv run bcbench dataset list --category ${{ inputs.category }} --github-output entries"

          if [[ "${{ inputs.modified-only }}" == "true" ]]; then
            cmd="$cmd --modified-only"
          elif [[ "${{ inputs.test-run }}" == "true" ]]; then
            cmd="$cmd --test-run"
          fi

          eval "$cmd"

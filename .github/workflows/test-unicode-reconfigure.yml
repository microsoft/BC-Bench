name: Test Unicode - Reconfigure

on:
  pull_request:
    branches: [main]

jobs:
  test-unicode-reconfigure:
    runs-on: [self-hosted, 1ES.Pool=GitHub-BCBench]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Test sys.stdout.reconfigure with Unicode
        run: |
          python -c "
            import sys
            sys.stdout.reconfigure(encoding='utf-8')
            sys.stderr.reconfigure(encoding='utf-8')
            # Test characters that failed before: ✓ (U+2713)
            text = 'Testing Unicode: ✓ ✗ → ← ↑ ↓ • ★ ♠ ♣ ♥ ♦'
            print(text)
            print('Reconfigure test passed!')
            "

      - name: Test with JSON containing Unicode (reconfigure approach)
        run: |
          python -c "
          import sys
          import json
          sys.stdout.reconfigure(encoding='utf-8')
          data = {'result': 'Task completed ✓ with success! → Next step...'}
          print(data['result'])
          print('JSON Unicode test passed!')
          "

      - name: Test bcbench agent module imports correctly
        run: |
          uv run python -c "
            from bcbench.agent.claude.agent import run_claude_code
            print('Import test passed ✓')
            "

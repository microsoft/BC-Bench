name: Evaluation with bcal
permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Azure OpenAI deployment name to use for bcal"
        required: false
        default: "gpt-5.2"
        type: choice
        options:
          - "gpt-5.2"
      llm-backend:
        description: "LLM backend for bcal. In this workflow, external-command uses the bc-eval CAPI bridge."
        required: false
        default: "azure-openai"
        type: choice
        options:
          - "azure-openai"
          - "external-command"
      external-model:
        description: "Model alias passed to the external-command bridge when llm-backend=external-command"
        required: false
        default: "gpt-5"
        type: string
      test-run:
        description: "Indicate this is a test run (with few entries)"
        required: false
        default: true
        type: boolean

concurrency:
  group: bcal-evaluation-${{ inputs.test-run && 'test' || 'full' }}
  cancel-in-progress: false

env:
  EVALUATION_RESULTS_DIR: evaluation_results
  # Stable absolute path so the .venv baked in prepare-workspace resolves
  # its Python interpreter the same way in the matrix job.
  UV_PYTHON_INSTALL_DIR: C:\bcbench-uv-python

jobs:
  get-entries:
    uses: ./.github/workflows/get-entries.yml
    with:
      test-run: ${{ inputs.test-run }}
      category: nl2al

  # A.3: hoist common setup. bcal CLI, the CAPI venv, BcContainerHelper, and
  # the NuGet credprovider are installed once here and republished as an
  # artifact. The matrix job downloads + restores instead of reinstalling
  # 16-32x in parallel. Saves ~3 CPU-h per attempt.
  #
  # Per-job by design (NOT hoisted): OIDC tokens for Key Vault (per-job
  # lifetime), bcartifacts download (per-entry, see A.2), and the BCal run
  # itself.
  prepare-workspace:
    runs-on: windows-latest
    needs: get-entries
    if: needs.get-entries.outputs.entries != '[]'
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    outputs:
      bccache-key: ${{ steps.bccache.outputs.key }}
      bccache-versions: ${{ steps.bccache.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Azure Login (OIDC) for ADO feed
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Install credprovider + bcal CLI to portable folder
        shell: pwsh
        env:
          BCAL_PACKAGE_ID: ${{ secrets.BCAL_PACKAGE_ID }}
          BCAL_FEED_URL: ${{ secrets.BCAL_FEED_URL }}
        run: |
          if (-not $env:BCAL_PACKAGE_ID -or -not $env:BCAL_FEED_URL) {
            throw "BCAL_PACKAGE_ID / BCAL_FEED_URL secrets are not configured."
          }

          # The credprovider installer calls the GitHub release API, which
          # intermittently returns 403 (rate-limited) on cold runs. Retry up
          # to 3 times with exponential backoff (1s, 4s, 16s).
          $maxAttempts = 3
          $delay = 1
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              iex "& { $(irm https://aka.ms/install-artifacts-credprovider.ps1) }"
              break
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw "credprovider install failed after $maxAttempts attempts: $($_.Exception.Message)"
              }
              Write-Warning "credprovider install attempt $attempt failed: $($_.Exception.Message). Retrying in ${delay}s..."
              Start-Sleep -Seconds $delay
              $delay = $delay * 4
            }
          }

          $adoToken = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
          Write-Output "::add-mask::$adoToken"

          $endpoints = @{
            endpointCredentials = @(
              @{
                endpoint = $env:BCAL_FEED_URL
                username = "anything"
                password = $adoToken
              }
            )
          } | ConvertTo-Json -Compress -Depth 5
          $env:VSS_NUGET_EXTERNAL_FEED_ENDPOINTS = $endpoints

          New-Item -ItemType Directory -Force -Path workspace-out\bcal-tools | Out-Null
          dotnet tool install --tool-path workspace-out\bcal-tools $env:BCAL_PACKAGE_ID --prerelease --add-source $env:BCAL_FEED_URL

          # Stage the credprovider plugin so the matrix job has it locally
          # if a future step ever needs to hit the ADO feed again.
          $credPath = "$env:USERPROFILE\.nuget\plugins"
          if (Test-Path $credPath) {
            Copy-Item -Path $credPath -Destination workspace-out\nuget-plugins -Recurse -Force
          }

      - name: Build bc-eval CAPI bridge venv
        if: ${{ inputs.llm-backend == 'external-command' }}
        shell: pwsh
        run: |
          $adoToken = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
          Write-Output "::add-mask::$adoToken"

          uv python install 3.12
          uv venv workspace-out\bcal-capi-venv --python 3.12
          uv pip install --python workspace-out\bcal-capi-venv\Scripts\python.exe "bc-eval[capi]==0.3.6" --index "https://anything:$($adoToken)@dynamicssmb2.pkgs.visualstudio.com/1fcb79e7-ab07-432a-a3c6-6cf5a88ba4a5/_packaging/BC_PythonFeed/pypi/simple/"

      # Fetch the CAPI client certificate once here so the matrix job can skip
      # azure/login + per-call Key Vault round-trips. Key Vault stores the
      # PKCS#12 (.pfx) as a base64-encoded secret. The matrix job picks this
      # up via $env:CAPI_CERT_FILE and the bc_eval_capi_bridge.py patcher.
      - name: Stage CAPI client certificate from Key Vault
        if: ${{ inputs.llm-backend == 'external-command' }}
        shell: pwsh
        env:
          CAPI_CERTIFICATE_KEY_VAULT_NAME: ${{ secrets.CAPI_CERTIFICATE_KEY_VAULT_NAME }}
          CAPI_CERTIFICATE_NAME: ${{ secrets.CAPI_CERTIFICATE_NAME }}
        run: |
          if (-not $env:CAPI_CERTIFICATE_KEY_VAULT_NAME -or -not $env:CAPI_CERTIFICATE_NAME) {
            throw "CAPI_CERTIFICATE_KEY_VAULT_NAME / CAPI_CERTIFICATE_NAME secrets must be set when llm-backend = external-command."
          }
          $b64 = az keyvault secret show --vault-name $env:CAPI_CERTIFICATE_KEY_VAULT_NAME --name $env:CAPI_CERTIFICATE_NAME --query value -o tsv
          if (-not $b64) {
            throw "Failed to fetch CAPI cert from Key Vault."
          }
          New-Item -ItemType Directory -Force -Path workspace-out | Out-Null
          [IO.File]::WriteAllBytes("$pwd\workspace-out\capi-cert.pfx", [Convert]::FromBase64String($b64))

      - name: Save BcContainerHelper module to portable folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path workspace-out\ps-modules | Out-Null
          Save-Module -Name BcContainerHelper -Path workspace-out\ps-modules -AllowPrerelease -Force

      # A.2: cache the BC sandbox artifact between runs. All matrix jobs land
      # on the same BC version(s); pre-downloading once and caching the
      # ~3 GB payload turns the per-entry symbol-download step into a no-op
      # (just a copy from the local cache).
      - name: Compute bcartifacts cache key
        id: bccache
        shell: pwsh
        run: |
          $versions = uv run python -c "import json; print(','.join(sorted({json.loads(l)['environment_setup_version'] for l in open('dataset/nl2al.jsonl', encoding='utf-8') if l.strip()})))"
          $bytes = [Text.Encoding]::UTF8.GetBytes("$versions|w1|v1")
          $stream = [System.IO.MemoryStream]::new($bytes)
          $hash = (Get-FileHash -InputStream $stream -Algorithm SHA256).Hash.Substring(0, 16)
          "key=bcartifacts-windows-$hash" >> $env:GITHUB_OUTPUT
          "versions=$versions" >> $env:GITHUB_OUTPUT
          Write-Host "BC versions: $versions"
          Write-Host "Cache key:   bcartifacts-windows-$hash"

      - name: Cache BC sandbox artifacts
        uses: actions/cache@v4
        with:
          path: C:\bcartifacts.cache
          key: ${{ steps.bccache.outputs.key }}
          restore-keys: |
            bcartifacts-windows-

      - name: Pre-download BC sandbox artifacts
        shell: pwsh
        env:
          BCARTIFACTS_VERSIONS: ${{ steps.bccache.outputs.versions }}
        run: |
          $env:PSModulePath = "$pwd\workspace-out\ps-modules;$env:PSModulePath"
          Import-Module BcContainerHelper -Force -DisableNameChecking
          foreach ($v in ($env:BCARTIFACTS_VERSIONS -split ',')) {
            if (-not $v) { continue }
            $url = Get-BCArtifactUrl -version $v -country w1 -select 'Latest'
            if (-not $url) { throw "No BC artifact URL resolved for version $v" }
            Write-Host "Pre-downloading $url"
            Download-Artifacts -artifactUrl $url -includePlatform | Out-Null
          }

      # Bake the bcbench .venv + UV-managed Python interpreter into the cache
      # so the matrix job can skip setup-python-uv entirely (-22 s * 125 jobs).
      # UV_PYTHON_INSTALL_DIR is fixed at workflow-env scope so the venv's
      # pyvenv.cfg references a path that also exists in the matrix job.
      - name: Bake Python + bcbench venv
        shell: pwsh
        run: |
          if (-not (Test-Path .venv)) {
            throw ".venv missing after setup-python-uv; bake step cannot proceed."
          }
          if (-not (Test-Path $env:UV_PYTHON_INSTALL_DIR)) {
            throw "$env:UV_PYTHON_INSTALL_DIR missing after uv python install; bake step cannot proceed."
          }
          Copy-Item -Path .venv -Destination workspace-out\bcbench-venv -Recurse -Force
          Copy-Item -Path $env:UV_PYTHON_INSTALL_DIR -Destination workspace-out\uv-python -Recurse -Force

      # Cache instead of upload-artifact: faster restore in matrix (~14 s -> a
      # few s for cache hit) AND avoids the 54 s artifact upload here. Keyed
      # by github.run_id so each workflow run gets its own slot and we never
      # collide with concurrent runs.
      - name: Save prepared workspace to cache
        uses: actions/cache/save@v4
        with:
          path: workspace-out
          key: prepared-workspace-${{ github.run_id }}

  evaluate-with-bcal:
    runs-on: windows-latest
    needs: [get-entries, prepare-workspace]
    outputs:
      results-dir: ${{ env.EVALUATION_RESULTS_DIR }}
    if: needs.get-entries.outputs.entries != '[]'
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        entry: ${{ fromJson(needs.get-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Restore the prepared workspace (bcal CLI, bcbench .venv, UV-managed
      # Python, BcContainerHelper, optional CAPI venv + client cert) from the
      # cache populated by prepare-workspace. Cache restore is ~3-5x faster
      # than the previous download-artifact step AND skips that job's upload.
      - name: Restore prepared workspace from cache
        id: restore-workspace
        uses: actions/cache/restore@v4
        with:
          path: workspace-out
          key: prepared-workspace-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Restore prepared workspace
        shell: pwsh
        run: |
          # bcal CLI: copy the portable --tool-path output into PATH.
          $dotnetTools = "$HOME\.dotnet\tools"
          New-Item -ItemType Directory -Force -Path $dotnetTools | Out-Null
          Copy-Item -Path workspace-out\bcal-tools\* -Destination $dotnetTools -Recurse -Force
          echo $dotnetTools >> $env:GITHUB_PATH

          # bcbench venv + UV-managed Python: restore to absolute paths that
          # match where prepare-workspace built them. The .venv pyvenv.cfg
          # references $env:UV_PYTHON_INSTALL_DIR\cpython-... which we set at
          # the workflow env level so it's identical in both jobs.
          if (Test-Path workspace-out\bcbench-venv) {
            if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }
            Move-Item -Path workspace-out\bcbench-venv -Destination .venv -Force
            "$env:GITHUB_WORKSPACE\.venv\Scripts" >> $env:GITHUB_PATH
          }
          if (Test-Path workspace-out\uv-python) {
            $parent = Split-Path -Parent $env:UV_PYTHON_INSTALL_DIR
            New-Item -ItemType Directory -Force -Path $parent | Out-Null
            if (Test-Path $env:UV_PYTHON_INSTALL_DIR) {
              Remove-Item -Recurse -Force $env:UV_PYTHON_INSTALL_DIR
            }
            Move-Item -Path workspace-out\uv-python -Destination $env:UV_PYTHON_INSTALL_DIR -Force
          }

          # CAPI venv (only present when llm-backend = external-command).
          # Run BCal step references $env:GITHUB_WORKSPACE\.bcal-capi-venv.
          if (Test-Path workspace-out\bcal-capi-venv) {
            Move-Item -Path workspace-out\bcal-capi-venv -Destination .bcal-capi-venv -Force
          }

          # BcContainerHelper module: expose it on PSModulePath for the
          # symbol-download step (no more Install-Module).
          "PSModulePath=$pwd\workspace-out\ps-modules;$env:PSModulePath" >> $env:GITHUB_ENV

          # Credprovider plugin: drop into ~/.nuget/plugins in case some
          # downstream step ever needs to hit the ADO feed again.
          if (Test-Path workspace-out\nuget-plugins) {
            $credDest = "$env:USERPROFILE\.nuget\plugins"
            New-Item -ItemType Directory -Force -Path $credDest | Out-Null
            Copy-Item -Path workspace-out\nuget-plugins\* -Destination $credDest -Recurse -Force
          }

      # A.2: restore bcartifacts cache that prepare-workspace populated.
      # Cache key is reused via job output to avoid a redundant `uv run python`
      # invocation here (we no longer have uv available in the matrix job).
      - name: Restore bcartifacts cache
        uses: actions/cache/restore@v4
        with:
          path: C:\bcartifacts.cache
          key: ${{ needs.prepare-workspace.outputs.bccache-key }}
          restore-keys: |
            bcartifacts-windows-

      - name: Download BC Application symbols
        shell: pwsh
        run: |
          .\scripts\Download-BCSymbols.ps1 -Category nl2al -InstanceId "${{ matrix.entry }}"

      - name: Run BCal for entry ${{ matrix.entry }}
        timeout-minutes: 18
        env:
          BCAL_LLM_BACKEND: ${{ inputs.llm-backend }}
          BCAL_LLM_MODEL: ${{ inputs.llm-backend == 'external-command' && inputs.external-model || inputs.model }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ inputs.model }}
          CAPI_ENDPOINT: ${{ secrets.CAPI_ENDPOINT }}
          CAPI_SCOPE: ${{ secrets.CAPI_SCOPE }}
          CAPI_ORG_GUID: ${{ secrets.CAPI_ORG_GUID }}
          CAPI_TENANT_ID: ${{ secrets.CAPI_TENANT_ID }}
          CAPI_USER_OBJECT_ID: ${{ secrets.CAPI_USER_OBJECT_ID }}
          CAPI_PARTNER_SOURCE: ${{ secrets.CAPI_PARTNER_SOURCE }}
          CAPI_CLIENT_ID: ${{ secrets.CAPI_CLIENT_ID }}
          CAPI_CERTIFICATE_KEY_VAULT_NAME: ${{ secrets.CAPI_CERTIFICATE_KEY_VAULT_NAME }}
          CAPI_CERTIFICATE_NAME: ${{ secrets.CAPI_CERTIFICATE_NAME }}
        shell: pwsh
        run: |
          if ("${{ inputs.llm-backend }}" -eq "external-command") {
            $env:CAPI_CERT_FILE = "$env:GITHUB_WORKSPACE\workspace-out\capi-cert.pfx"
            if (-not (Test-Path $env:CAPI_CERT_FILE)) {
              throw "Expected CAPI client cert at $env:CAPI_CERT_FILE but it was not restored from the cache."
            }
            $env:BCAL_LLM_COMMAND = "$env:GITHUB_WORKSPACE\.bcal-capi-venv\Scripts\python.exe $env:GITHUB_WORKSPACE\src\bcbench\agent\bcal\bc_eval_capi_bridge.py"
          }

          bcbench evaluate bcal "${{ matrix.entry }}" --output-dir "${{ env.EVALUATION_RESULTS_DIR }}"

      - name: Upload evaluation results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: evaluation-results-${{ github.run_id }}-${{ matrix.entry }}
          path: ${{ env.EVALUATION_RESULTS_DIR }}/**/*.jsonl
          retention-days: ${{ inputs.test-run && 1 || 30 }}

  summarize-results:
    needs: evaluate-with-bcal
    uses: ./.github/workflows/summarize-results.yml
    permissions:
      contents: write
      id-token: write
    with:
      results-dir: ${{ needs.evaluate-with-bcal.outputs.results-dir }}
      model: ${{ inputs.llm-backend == 'external-command' && inputs.external-model || inputs.model }}
      agent: ${{ inputs.llm-backend == 'external-command' && 'BCal-external-command' || 'BCal' }}
      mock: ${{ inputs.test-run }}
      category: nl2al
      skip-leaderboard: true
    secrets: inherit

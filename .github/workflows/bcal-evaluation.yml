name: Evaluation with bcal
permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Azure OpenAI deployment name to use for bcal"
        required: false
        default: "gpt-5.2"
        type: choice
        options:
          - "gpt-5.2"
      llm-backend:
        description: "LLM backend for bcal. In this workflow, external-command uses the bc-eval CAPI bridge."
        required: false
        default: "azure-openai"
        type: choice
        options:
          - "azure-openai"
          - "external-command"
      external-model:
        description: "Model alias passed to the external-command bridge when llm-backend=external-command"
        required: false
        default: "gpt-5"
        type: string
      test-run:
        description: "Indicate this is a test run (with few entries)"
        required: false
        default: true
        type: boolean

concurrency:
  group: bcal-evaluation-${{ inputs.test-run && 'test' || 'full' }}
  cancel-in-progress: false

env:
  EVALUATION_RESULTS_DIR: evaluation_results

jobs:
  get-entries:
    uses: ./.github/workflows/get-entries.yml
    with:
      test-run: ${{ inputs.test-run }}
      category: nl2al

  # A.3: hoist common setup. bcal CLI, the CAPI venv, BcContainerHelper, and
  # the NuGet credprovider are installed once here and republished as an
  # artifact. The matrix job downloads + restores instead of reinstalling
  # 16-32x in parallel. Saves ~3 CPU-h per attempt.
  #
  # Per-job by design (NOT hoisted): OIDC tokens for Key Vault (per-job
  # lifetime), bcartifacts download (per-entry, see A.2), and the BCal run
  # itself.
  prepare-workspace:
    runs-on: windows-latest
    needs: get-entries
    if: needs.get-entries.outputs.entries != '[]'
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Azure Login (OIDC) for ADO feed
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Install credprovider + bcal CLI to portable folder
        shell: pwsh
        env:
          BCAL_PACKAGE_ID: ${{ secrets.BCAL_PACKAGE_ID }}
          BCAL_FEED_URL: ${{ secrets.BCAL_FEED_URL }}
        run: |
          if (-not $env:BCAL_PACKAGE_ID -or -not $env:BCAL_FEED_URL) {
            throw "BCAL_PACKAGE_ID / BCAL_FEED_URL secrets are not configured."
          }

          # The credprovider installer calls the GitHub release API, which
          # intermittently returns 403 (rate-limited) on cold runs. Retry up
          # to 3 times with exponential backoff (1s, 4s, 16s).
          $maxAttempts = 3
          $delay = 1
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              iex "& { $(irm https://aka.ms/install-artifacts-credprovider.ps1) }"
              break
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw "credprovider install failed after $maxAttempts attempts: $($_.Exception.Message)"
              }
              Write-Warning "credprovider install attempt $attempt failed: $($_.Exception.Message). Retrying in ${delay}s..."
              Start-Sleep -Seconds $delay
              $delay = $delay * 4
            }
          }

          $adoToken = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
          Write-Output "::add-mask::$adoToken"

          $endpoints = @{
            endpointCredentials = @(
              @{
                endpoint = $env:BCAL_FEED_URL
                username = "anything"
                password = $adoToken
              }
            )
          } | ConvertTo-Json -Compress -Depth 5
          $env:VSS_NUGET_EXTERNAL_FEED_ENDPOINTS = $endpoints

          New-Item -ItemType Directory -Force -Path workspace-out\bcal-tools | Out-Null
          dotnet tool install --tool-path workspace-out\bcal-tools $env:BCAL_PACKAGE_ID --prerelease --add-source $env:BCAL_FEED_URL

          # Stage the credprovider plugin so the matrix job has it locally
          # if a future step ever needs to hit the ADO feed again.
          $credPath = "$env:USERPROFILE\.nuget\plugins"
          if (Test-Path $credPath) {
            Copy-Item -Path $credPath -Destination workspace-out\nuget-plugins -Recurse -Force
          }

      - name: Build bc-eval CAPI bridge venv
        if: ${{ inputs.llm-backend == 'external-command' }}
        shell: pwsh
        run: |
          $adoToken = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
          Write-Output "::add-mask::$adoToken"

          uv python install 3.12
          uv venv workspace-out\bcal-capi-venv --python 3.12
          uv pip install --python workspace-out\bcal-capi-venv\Scripts\python.exe "bc-eval[capi]==0.3.6" --index "https://anything:$($adoToken)@dynamicssmb2.pkgs.visualstudio.com/1fcb79e7-ab07-432a-a3c6-6cf5a88ba4a5/_packaging/BC_PythonFeed/pypi/simple/"

      - name: Save BcContainerHelper module to portable folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path workspace-out\ps-modules | Out-Null
          Save-Module -Name BcContainerHelper -Path workspace-out\ps-modules -AllowPrerelease -Force

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v6
        with:
          name: prepared-workspace-${{ github.run_id }}
          path: workspace-out/
          retention-days: 1
          include-hidden-files: true

  evaluate-with-bcal:
    runs-on: windows-latest
    needs: [get-entries, prepare-workspace]
    outputs:
      results-dir: ${{ env.EVALUATION_RESULTS_DIR }}
    if: needs.get-entries.outputs.entries != '[]'
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        entry: ${{ fromJson(needs.get-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Download prepared workspace
        uses: actions/download-artifact@v6
        with:
          name: prepared-workspace-${{ github.run_id }}
          path: workspace-in

      - name: Restore prepared workspace
        shell: pwsh
        run: |
          # bcal CLI: copy the portable --tool-path output into PATH.
          $dotnetTools = "$HOME\.dotnet\tools"
          New-Item -ItemType Directory -Force -Path $dotnetTools | Out-Null
          Copy-Item -Path workspace-in\bcal-tools\* -Destination $dotnetTools -Recurse -Force
          echo $dotnetTools >> $env:GITHUB_PATH

          # CAPI venv (only present when llm-backend = external-command).
          # Run BCal step references $env:GITHUB_WORKSPACE\.bcal-capi-venv.
          # uv venvs are relocatable as long as the base Python at the path
          # in pyvenv.cfg also exists; we run `uv python install 3.12` here
          # to make sure it does, then move the venv into place.
          if (Test-Path workspace-in\bcal-capi-venv) {
            uv python install 3.12
            Move-Item -Path workspace-in\bcal-capi-venv -Destination .bcal-capi-venv -Force
          }

          # BcContainerHelper module: expose it on PSModulePath for the
          # symbol-download step (no more Install-Module).
          "PSModulePath=$pwd\workspace-in\ps-modules;$env:PSModulePath" >> $env:GITHUB_ENV

          # Credprovider plugin: drop into ~/.nuget/plugins in case some
          # downstream step ever needs to hit the ADO feed again.
          if (Test-Path workspace-in\nuget-plugins) {
            $credDest = "$env:USERPROFILE\.nuget\plugins"
            New-Item -ItemType Directory -Force -Path $credDest | Out-Null
            Copy-Item -Path workspace-in\nuget-plugins\* -Destination $credDest -Recurse -Force
          }

      - name: Download BC Application symbols
        shell: pwsh
        run: |
          .\scripts\Download-BCSymbols.ps1 -Category nl2al -InstanceId "${{ matrix.entry }}"

      - name: Azure Login (OIDC) for CAPI Key Vault
        if: ${{ inputs.llm-backend == 'external-command' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Run BCal for entry ${{ matrix.entry }}
        timeout-minutes: 30
        env:
          BCAL_LLM_BACKEND: ${{ inputs.llm-backend }}
          BCAL_LLM_MODEL: ${{ inputs.llm-backend == 'external-command' && inputs.external-model || inputs.model }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ inputs.model }}
          CAPI_ENDPOINT: ${{ secrets.CAPI_ENDPOINT }}
          CAPI_SCOPE: ${{ secrets.CAPI_SCOPE }}
          CAPI_ORG_GUID: ${{ secrets.CAPI_ORG_GUID }}
          CAPI_TENANT_ID: ${{ secrets.CAPI_TENANT_ID }}
          CAPI_USER_OBJECT_ID: ${{ secrets.CAPI_USER_OBJECT_ID }}
          CAPI_PARTNER_SOURCE: ${{ secrets.CAPI_PARTNER_SOURCE }}
          CAPI_CLIENT_ID: ${{ secrets.CAPI_CLIENT_ID }}
          CAPI_CERTIFICATE_KEY_VAULT_NAME: ${{ secrets.CAPI_CERTIFICATE_KEY_VAULT_NAME }}
          CAPI_CERTIFICATE_NAME: ${{ secrets.CAPI_CERTIFICATE_NAME }}
        shell: pwsh
        run: |
          if ("${{ inputs.llm-backend }}" -eq "external-command") {
            $keyVaultToken = az account get-access-token --resource https://vault.azure.net --query accessToken -o tsv
            if (-not $keyVaultToken) {
              throw "Failed to acquire a Key Vault token for the CAPI bridge."
            }
            Write-Output "::add-mask::$keyVaultToken"
            $env:BCAL_LLM_COMMAND = "$env:GITHUB_WORKSPACE\.bcal-capi-venv\Scripts\python.exe $env:GITHUB_WORKSPACE\src\bcbench\agent\bcal\bc_eval_capi_bridge.py"
          }

          uv run bcbench evaluate bcal "${{ matrix.entry }}" --output-dir "${{ env.EVALUATION_RESULTS_DIR }}"

      - name: Upload evaluation results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: evaluation-results-${{ github.run_id }}-${{ matrix.entry }}
          path: ${{ env.EVALUATION_RESULTS_DIR }}/**/*.jsonl
          retention-days: ${{ inputs.test-run && 1 || 30 }}

  summarize-results:
    needs: evaluate-with-bcal
    uses: ./.github/workflows/summarize-results.yml
    permissions:
      contents: write
      id-token: write
    with:
      results-dir: ${{ needs.evaluate-with-bcal.outputs.results-dir }}
      model: ${{ inputs.llm-backend == 'external-command' && inputs.external-model || inputs.model }}
      agent: ${{ inputs.llm-backend == 'external-command' && 'BCal-external-command' || 'BCal' }}
      mock: ${{ inputs.test-run }}
      category: nl2al
      skip-leaderboard: true
    secrets: inherit

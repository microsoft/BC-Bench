name: Verify Dataset Candidate
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      instance-id:
        description: "Dataset entry instance ID to verify (e.g. microsoft__BCApps-12345)"
        required: true
        type: string

jobs:
  verify:
    runs-on: [GitHub-BCBench]
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    name: Verify ${{ inputs.instance-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup BC container
        id: setup-env
        timeout-minutes: 40
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ inputs.instance-id }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build and test verification for ${{ inputs.instance-id }}
        timeout-minutes: 60
        run: .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ inputs.instance-id }}" -RepoPath "${{ steps.setup-env.outputs.repo_path }}"
        shell: pwsh

name: Summarize Evaluation Results
description: Reusable workflow to download and summarize evaluation results

on:
  workflow_call:
    inputs:
      results-dir:
        description: Directory to download results to
        required: true
        type: string
      model:
        description: 'model to use for evaluation'
        required: true
        type: string
      agent:
        description: 'type of agent used for evaluation'
        required: true
        type: string

jobs:
  summarize-results:
    name: Results
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.results-dir }}/
          merge-multiple: true

      - name: Summarize evaluation results
        run: |
          uv run bcbench result summarize --result-dir "${{ inputs.results-dir }}" --bceval-output "bceval_results.jsonl"
        shell: pwsh

      - name: Upload evaluation summary to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-summary
          path: ${{ inputs.results-dir }}/${{ github.run_id }}/evaluation_summary.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload result with bceval to Braintrust
        env:
          BRAINTRUST_PROJECT_ID: ${{ secrets.BRAINTRUST_PROJECT_ID }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          ADO_TOKEN: ${{ secrets.ADO_TOKEN }}
          USERNAME: ${{ secrets.USERNAME }}
        shell: pwsh
        run: |
          # Install bc-eval from ADO feed using CLI options (won't touch uv.lock)
          uv tool install bc-eval --index "https://${{ env.USERNAME }}:${{ env.ADO_TOKEN }}@dynamicssmb2.pkgs.visualstudio.com/1fcb79e7-ab07-432a-a3c6-6cf5a88ba4a5/_packaging/PythonPackages%40Local/pypi/simple/"

          # Upload summary to Braintrust using bc-eval
          $bcevalResultsFile = "${{ inputs.results-dir }}/${{ github.run_id }}/bceval_results.jsonl"

          bceval metrics calculate --input-file $bcevalResultsFile --evaluators "resolution_rate" --evaluator-definitions "${{ github.workspace }}/evaluator/scores.py" --eval-run-name "${{ github.event.inputs.agent }} (${{ github.event.inputs.model }})"

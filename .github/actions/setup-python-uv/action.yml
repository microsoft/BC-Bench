name: Setup Python with UV
description: Install UV, setup Python, and install bcbench package

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Setup Python
      run: uv python install
      shell: pwsh

    - name: Install bcbench package
      run: uv sync
      shell: pwsh

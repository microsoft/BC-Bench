name: Setup BC Container and Repository
description: Install BcContainerHelper and setup BC container along with repository

inputs:
  instance-id:
    description: Instance ID for the dataset entry
    required: true
  category:
    description: Category for the dataset entry
    required: true
  azure-client-id:
    description: Azure AD application client ID for OIDC authentication
    required: true
  azure-tenant-id:
    description: Azure AD tenant ID for OIDC authentication
    required: true
  github-token:
    description: GitHub token for accessing public repositories
    required: true
  skip-container:
    description: Skip BC container setup (only clone repository)
    required: false
    default: "false"

outputs:
  repo_path:
    description: Path to the cloned repository
    value: ${{ steps.setup.outputs.repo_path }}

runs:
  using: composite
  steps:
    - name: Generate BC container name and credentials
      if: inputs.skip-container != 'true'
      run: |
        # Generate a 32-character random password using Get-Random
        # The password is short-lived and only used for the duration of the workflow
        $password = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 32 | ForEach-Object { [char]$_ })

        # Mask the password in GitHub Actions logs
        Write-Output "::add-mask::$password"

        $containerName = "bcbench-$("${{ inputs.instance-id }}".Split('-')[1])"
        "BC_CONTAINER_NAME=$containerName" | Out-File -FilePath $env:GITHUB_ENV -Append

        # Connection target + credentials consumed by altool
        "BC_SERVER_URL=http://$containerName" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_SERVER_INSTANCE=BC" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_SERVER_USERNAME=admin" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_SERVER_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: pwsh

    - name: Install BcContainerHelper module
      if: inputs.skip-container != 'true'
      run: |
        Install-Module -Name BcContainerHelper -Force -AllowClobber -AllowPrerelease
      shell: pwsh

    - name: Azure Login with OIDC for cloning internal repository
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        allow-no-subscriptions: true

    - name: Resolve BC version for artifact cache
      if: inputs.skip-container != 'true'
      id: bcversion
      shell: pwsh
      run: |
        Import-Module ./scripts/BCBenchUtils.psm1 -Force -DisableNameChecking
        $version = Get-BCBenchEntryVersion -InstanceId "${{ inputs.instance-id }}" -Category "${{ inputs.category }}"
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    # Reuse BC artifacts (app + platform) at BcContainerHelper's default host cache so New-BcContainer /
    # New-BcCompilerFolder skip the multi-GB download. Download-Artifacts is cache-first (useVolumes=$false),
    # keyed by the entry's BC sandbox version and shared across workflows that use this action.
    - name: Cache BC sandbox artifacts
      if: inputs.skip-container != 'true'
      uses: actions/cache@v5
      with:
        path: C:\bcartifacts.cache
        key: bcartifacts-${{ steps.bcversion.outputs.version }}

    - name: Setup BC container and repository for ${{ inputs.instance-id }}
      id: setup
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        Write-Output "::add-mask::$env:GITHUB_TOKEN"

        # Get Azure DevOps access token via OIDC
        $env:ADO_TOKEN = az account get-access-token --resource "499b84ac-1321-427f-aa17-267ca6975798" --query accessToken -o tsv
        Write-Output "::add-mask::$env:ADO_TOKEN"

        .\scripts\Setup-ContainerAndRepository.ps1 -InstanceId "${{ inputs.instance-id }}" -Category "${{ inputs.category }}" ${{ inputs.skip-container == 'true' && '-SkipContainer' || '' }}
      shell: pwsh

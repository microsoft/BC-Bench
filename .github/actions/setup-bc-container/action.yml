name: Setup BC Container
description: Install BcContainerHelper and setup BC container with repository

inputs:
  instance-id:
    description: Instance ID for the dataset entry
    required: true
  ado-token:
    description: Token for cloning the NAV repository
    required: true

outputs:
  repo_path:
    description: Path to the cloned repository
    value: ${{ steps.setup.outputs.repo_path }}

runs:
  using: composite
  steps:
    - name: Generate BC container credentials
      run: |
        # Generate a 32-character cryptographically secure random password
        # Using .NET's RandomNumberGenerator for cryptographically secure randomness
        $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
        $rng = [System.Security.Cryptography.RandomNumberGenerator]::Create()
        $bytes = New-Object byte[] 32
        $rng.GetBytes($bytes)
        $password = -join ($bytes | ForEach-Object { $chars[$_ % $chars.Length] })
        "BC_CONTAINER_NAME=bcbench" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_CONTAINER_USERNAME=admin" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_CONTAINER_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: pwsh

    - name: Install BcContainerHelper module
      run: Install-Module -Name BcContainerHelper -Force -AllowClobber
      shell: pwsh

    - name: Setup BC container and repository for ${{ inputs.instance-id }}
      id: setup
      env:
        ADO_TOKEN: ${{ inputs.ado-token }}
      run: .\scripts\Setup-ContainerAndRepository.ps1 -InstanceId "${{ inputs.instance-id }}"
      shell: pwsh

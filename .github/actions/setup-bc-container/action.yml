name: Setup BC Container
description: Install BcContainerHelper and setup BC container with repository

inputs:
  instance-id:
    description: Instance ID for the dataset entry
    required: true
  azure-client-id:
    description: Azure AD application client ID for OIDC authentication
    required: true
  azure-tenant-id:
    description: Azure AD tenant ID for OIDC authentication
    required: true
  github-token:
    description: GitHub token for accessing public repositories
    required: true

outputs:
  repo_path:
    description: Path to the cloned repository
    value: ${{ steps.setup.outputs.repo_path }}

runs:
  using: composite
  steps:
    - name: Generate BC container credentials
      run: |
        # Generate a 32-character random password using Get-Random
        # The password is short-lived and only used for the duration of the workflow
        $password = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 32 | ForEach-Object { [char]$_ })

        # Mask the password in GitHub Actions logs
        Write-Output "::add-mask::$password"

        "BC_CONTAINER_NAME=bcbench" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_CONTAINER_USERNAME=admin" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_CONTAINER_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: pwsh

    - name: Install BcContainerHelper module
      run: Install-Module -Name BcContainerHelper -Force -AllowClobber -AllowPrerelease
      shell: pwsh

    - name: Get cache keys for Docker image and BC artifacts
      id: cache-info
      run: |
        using module .\scripts\BCBenchUtils.psm1
        Import-Module BcContainerHelper -Force -DisableNameChecking

        # Get generic image cache info
        $imageInfo = Get-GenericImageCacheInfo
        "generic-image=$($imageInfo['image'])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "generic-cache-key=$($imageInfo['cache-key'])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

        # Get BC artifacts cache info
        $artifactInfo = Get-BCArtifactsCacheInfo -InstanceId "${{ inputs.instance-id }}"
        "artifacts-cache-key=$($artifactInfo['cache-key'])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Cache generic Docker image
      id: cache-generic-image
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/docker-cache/generic-image.tar
        key: ${{ steps.cache-info.outputs.generic-cache-key }}

    - name: Load generic image from cache
      if: steps.cache-generic-image.outputs.cache-hit == 'true'
      run: |
        Write-Host "Loading generic image from cache..."
        docker load -i "${{ runner.temp }}/docker-cache/generic-image.tar"
        Write-Host "Generic image loaded successfully."
      shell: pwsh

    - name: Pull and save generic image for caching
      if: steps.cache-generic-image.outputs.cache-hit != 'true'
      run: |
        $genericImage = "${{ steps.cache-info.outputs.generic-image }}"
        Write-Host "Pulling generic image: $genericImage"
        docker pull $genericImage
        New-Item -ItemType Directory -Path "${{ runner.temp }}/docker-cache" -Force | Out-Null
        docker save -o "${{ runner.temp }}/docker-cache/generic-image.tar" $genericImage
        Write-Host "Generic image saved for caching."
      shell: pwsh

    - name: Cache BC artifacts
      id: cache-artifacts
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/bcartifacts.cache
        key: ${{ steps.cache-info.outputs.artifacts-cache-key }}

    - name: Azure Login with OIDC for cloning internal repository
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        allow-no-subscriptions: true

    - name: Setup BC container and repository for ${{ inputs.instance-id }}
      id: setup
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        BC_ARTIFACTS_CACHE_FOLDER: ${{ runner.temp }}/bcartifacts.cache
      run: |
        # Get Azure DevOps access token via OIDC
        $env:ADO_TOKEN = az account get-access-token --resource "499b84ac-1321-427f-aa17-267ca6975798" --query accessToken -o tsv
        Write-Output "::add-mask::$env:ADO_TOKEN"

        .\scripts\Setup-ContainerAndRepository.ps1 -InstanceId "${{ inputs.instance-id }}"
      shell: pwsh
